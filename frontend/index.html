<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yew + Tailwind</title>
  <script>
    // Use class-based dark mode so toggling the `dark` class works
    window.tailwind = window.tailwind || {};
    window.tailwind.config = window.tailwind.config || {};
    window.tailwind.config.darkMode = 'class';
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Ensure correct text-size-adjust value for mobile browsers */
    html {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    /* Use Inter for better typography */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

    body {
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;

      /* Small animations */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-fade-in {
        animation: fadeInUp 280ms ease both;
      }

      .spinner {
        border: 3px solid rgba(0, 0, 0, 0.1);
        border-left-color: rgba(0, 0, 0, 0.6);
        border-radius: 9999px;
        width: 36px;
        height: 36px;
        animation: spin 900ms linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <!-- Trunk injects the correct module loader; remove manual pkg import to avoid 404/mime issues -->
</body>

</html>
